name: Build and Deploy to Production

on:
  push:
    branches:
      - prov

jobs:
  build-and-deploy:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile \
            --name weather \
            --add-data "memory:memory" \
            --add-data "model:model" \
            main.py

      - name: Verify build output
        run: |
          ls -la dist/
          file dist/weather

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 prov.stoprefactoring.com >> ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          scp -P 22 dist/weather root@prov.stoprefactoring.com:/public/engine/
          ssh -p 22 root@prov.stoprefactoring.com "chmod +x /public/engine/weather && ls -la /public/engine/weather"

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.126.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[PROD] Weather Build Success"
          to: yiigaa@126.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Production environment build completed successfully!

            Branch: prov
            Commit: ${{ github.sha }}
            Build Time: ${{ github.event.head_commit.timestamp }}

            The weather binary has been deployed to:
            prov.stoprefactoring.com:/public/engine/weather

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.126.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[PROD] Weather Build Failed"
          to: yiigaa@126.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Production environment build failed!

            Branch: prov
            Commit: ${{ github.sha }}
            Failed Step: ${{ job.status }}

            Please check the GitHub Actions logs for details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
