name: Test Environment CI/CD

on:
  push:
    branches: [ test ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
          --name weather \
          --add-data "memory:memory" \
          --add-data "model:model" \
          --hidden-import=tensorflow \
          --hidden-import=numpy \
          --hidden-import=config \
          main.py

    - name: Verify build output
      run: |
        ls -la dist/
        file dist/weather

    - name: Deploy to test server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: test.stoprefactoring.com
        port: 22
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "dist/weather"
        target: "/public/engine/"
        strip_components: 1

    - name: Send success email notification
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Test Environment Deployment SUCCESS"
        body: |
          Test Environment Deployment Successful!
          
          Project: Weather Prediction System
          Environment: Test
          Branch: test
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Time: $(date)
          
          Build completed successfully and deployed to test.stoprefactoring.com:/public/engine/weather
        to: yiigaa@126.com
        from: CI/CD System

    - name: Send failure email notification
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Test Environment Deployment FAILED"
        body: |
          Test Environment Deployment FAILED!
          
          Project: Weather Prediction System
          Environment: Test
          Branch: test
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Time: $(date)
          
          Please check the GitHub Actions logs for more details.
        to: yiigaa@126.com
        from: CI/CD System
