name: Build and Deploy to Test Environment

on:
  push:
    branches:
      - test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name weather \
            --add-data "memory:memory" \
            --add-data "model:model" \
            main.py

      - name: Verify build output
        run: |
          ls -la dist/
          file dist/weather

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TEST_SSH_KEY }}

      - name: Deploy to test server
        run: |
          ssh -o StrictHostKeyChecking=no -p 22 root@test.stoprefactoring.com "mkdir -p /public/engine/"
          scp -o StrictHostKeyChecking=no -P 22 dist/weather root@test.stoprefactoring.com:/public/engine/

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.126.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[TEST] Weather Build Success"
          body: |
            Test environment build and deployment completed successfully!

            Branch: test
            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}

            The weather binary has been deployed to test.stoprefactoring.com:/public/engine/
          to: yiigaa@126.com
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.126.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[TEST] Weather Build Failed"
          body: |
            Test environment build or deployment failed!

            Branch: test
            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}

            Please check the GitHub Actions logs for details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: yiigaa@126.com
          from: ${{ secrets.EMAIL_USERNAME }}
