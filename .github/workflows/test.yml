name: CI - Test Environment

on:
  push:
    branches:
      - test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name weather \
            --add-data "memory:memory" \
            --add-data "model:model" \
            main.py

      - name: Deploy to test server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: test.stoprefactoring.com
          port: 22
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/weather"
          target: "/public/engine/"
          strip_components: 1

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.126.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Build Success - Test Environment"
          body: |
            Build and deployment completed successfully!
            
            Environment: Test
            Branch: test
            Commit: ${{ github.sha }}
            Repository: ${{ github.repository }}
          to: yiigaa@126.com
          from: CI Bot

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.126.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Build Failed - Test Environment"
          body: |
            Build or deployment failed!
            
            Environment: Test
            Branch: test
            Commit: ${{ github.sha }}
            Repository: ${{ github.repository }}
            
            Please check the workflow logs for details.
          to: yiigaa@126.com
          from: CI Bot
